# Scoring Configuration for Hotspot
# This file defines the default weights and metadata for all analytical modes.

# Scoring Mode Definitions
# Each mode targets a specific risk or opportunity profile in the codebase.
modes:
  hot:
    name: "hot"
    purpose: "Activity hotspots - high recent activity & volatility"
    factors: ["Commits", "Churn", "Contributors", "Age", "Size"]
    factor_keys: ["commits", "churn", "contrib", "age", "size"]
    weights:
      # Activity Signals
      commits: 0.40
      churn: 0.40
      
      # Social & Context Signals
      contrib: 0.05
      age: 0.10
      size: 0.05

  risk:
    name: "risk"
    purpose: "Knowledge risk/bus factor - concentrated ownership & knowledge decay"
    factors: ["InvContributors", "Gini", "LowRecent", "Age", "Size", "Churn", "LOC"]
    factor_keys: ["inv_contrib", "gini", "low_recent", "age", "size", "churn", "loc"]
    weights:
      # Ownership Concentration
      inv_contrib: 0.25
      gini: 0.25
      
      # Knowledge Decay & Staleness
      low_recent: 0.15
      age: 0.15
      
      # Technical Profile
      size: 0.10
      loc: 0.05
      churn: 0.05

  complexity:
    name: "complexity"
    purpose: "Technical debt - large, old files with high maintenance burden"
    factors: ["Age", "Churn", "Commits", "LOC", "LowRecent", "Size"]
    factor_keys: ["age", "churn", "commits", "loc", "low_recent", "size"]
    weights:
      # Legacy Maturity
      age: 0.30
      loc: 0.20
      size: 0.05
      
      # Maintenance Volatility
      churn: 0.30
      commits: 0.10
      low_recent: 0.05

  roi:
    name: "roi"
    purpose: "ROI - priority for refactoring effort based on technical impact"
    factors: ["Churn", "LOC", "Gini", "Age"]
    factor_keys: ["churn", "loc", "gini", "age"]
    weights:
      # Refactoring Opportunity (High waste on complex files)
      churn: 0.35
      loc: 0.25
      
      # Risk Context
      gini: 0.25
      age: 0.15
