# examples/hotspot.small.yml
#
# Configuration optimized for small, focused repositories: single-purpose CLI
# tools, microservices, libraries, or internal modules.
#
# Key concerns for small repos:
#   - Identify the handful of files driving most of the activity churn.
#   - Detect early-stage bus factor risk before the team grows.
#   - Keep analysis fast and output actionable without deep configuration.

# --- Global Settings ---
# limit: Top 10 results is sufficient; small repos rarely need more.
limit: 10
# workers: 4 workers is plenty for shallow histories and small file counts.
workers: 4
# mode: 'hot' quickly surfaces the most frequently-changed files — the most
#       intuitive starting point for a small, focused codebase.
mode: hot
# precision: Single decimal keeps results readable without false precision.
precision: 1

# --- Command-Specific Settings ---
# owner: Print the primary owner to identify key contributors and potential
#        bus factor risk early in the project lifecycle.
owner: true
# follow: Disable for speed; rename tracking rarely matters in stable small repos.
follow: false
# detail: Disable by default to keep the output compact and scannable.
detail: false
