# examples/hotspot.infra.yml
#
# Configuration optimized for infrastructure-as-code (IaC) repositories:
# Ansible playbooks, Terraform modules, Helm charts, Kustomize overlays, etc.
#
# Key concerns for IaC repos:
#   - Knowledge silos are operationally dangerous: a single engineer owning
#     a critical Terraform module or Ansible role is a high bus-factor risk.
#   - Stale IaC files are drift candidates — unmaintained configs often diverge
#     from actual infrastructure state silently.
#   - Churn in environment-specific overlays (prod vs. staging) signals risk
#     without necessarily indicating technical debt in the traditional sense.
#
# Recommended workflow:
#   1. Run with 'risk' mode to find under-owned modules and playbooks.
#   2. Run with 'stale' mode to detect configs that may have drifted.
#   3. Use --filter to scope analysis to a specific environment or module group.

# --- Global Settings ---
# limit: Show top 20 results; IaC repos often have many environmental variants.
limit: 20
# workers: Moderate concurrency; IaC histories are usually shallow.
workers: 8
# mode: 'risk' is the primary signal for IaC — bus factor on playbooks and
#       modules is a direct operational continuity risk.
mode: risk
# precision: One decimal is sufficient for IaC risk scoring.
precision: 1
# start: Extend the lookback window; IaC files change infrequently by design,
#        so a narrow window can make healthy files appear falsely stale.
start: "2 years ago"

# --- Command-Specific Settings ---
# owner: Always show the primary owner — IaC ownership is critical for on-call.
owner: true
# detail: Print file metadata to help distinguish module size and age.
detail: true
# follow: Enable to track module renames and directory restructures accurately.
follow: true

# --- Exclusions ---
# exclude: Skip lock files, generated provider schemas, and example/test fixtures
#          that inflate commit counts without reflecting production risk.
exclude: ".terraform.lock.hcl,**/.terraform/,**/examples/,**/tests/,**/fixtures/"

# --- Custom Scoring Weights (Risk Mode) ---
# Shift weight toward contributor concentration (inv_contrib, gini) and away
# from size/churn, which are less meaningful signals in declarative IaC files.
weights:
  risk:
    age: 0.10
    churn: 0.04
    commits: 0.04
    gini: 0.30        # Increased: unequal contributor distribution is critical
    inv_contrib: 0.40 # Increased: few-owner modules are highest operational risk
    loc: 0.06
    size: 0.06

  stale:
    age: 0.25         # Increased: old, untouched IaC is a drift warning
    commits: 0.10
    contrib: 0.05
    inv_recent: 0.45  # Increased: IaC that hasn't been touched is a red flag
    size: 0.15
