# examples/hotspot.mcp.yaml
#
# A configuration file optimized for running Hotspot as an MCP server.
# This setup configures caching and analysis backends so that the AI agent
# can perform deep analysis quickly without repeatedly waiting on Git commands.

# --- Global Settings ---
# workers: Use maximum generic workers to speed up background AI requests.
workers: 8
# limit: A sensible default limit so the AI does not get overwhelmed with context window size.
limit: 20
# start: Optional default start date (ISO8601 or relative like "3 months ago")
# start: "30d"
# end: Optional default end date (anchors trend analysis)
# end: "now"
# urn: "git:github.com/owner/repo" # Use URN for path-independent repository identity

# --- Advanced Features ---
# owner: Helpful context for the AI agent to know who to ping for specific files.
owner: true
# follow: Keep rename tracking active to ensure accurate historical tracking.
follow: true
# threads: Increase the number of concurrent git log processes.
threads: 4

# --- Database / Backend Settings ---
# Local SQLite works for individual use. For enterprise/teams, use PostgreSQL or MySQL
# for shared analysis databases, better concurrency, and enterprise features.
#
# PostgreSQL example:
# cache:
#   backend: postgresql
#   db_connect: "host=hotspot-db.company.com port=5432 user=hotspot dbname=hotspot_cache sslmode=require"
# analysis:
#   backend: postgresql
#   db_connect: "host=hotspot-db.company.com port=5432 user=hotspot dbname=hotspot_analysis sslmode=require"
#
# MySQL example:
# cache:
#   backend: mysql
#   db_connect: "hotspot@tcp(hotspot-db.company.com:3306)/hotspot_cache"
# analysis:
#   backend: mysql
#   db_connect: "hotspot@tcp(hotspot-db.company.com:3306)/hotspot_analysis"
#
# Local SQLite (default):
cache:
  backend: sqlite
  db_connect: ".hotspot_cache.db"
analysis:
  backend: sqlite
  db_connect: ".hotspot_analysis.db"
